<div class="home-container">
  <div class="account-header">
    <div class="account-info">
      <div class="account-owner">
        <h1>{{getAccountName()}}</h1>
        <span class="account-iban">IBAN: xxx • Conto corrente</span>
      </div>
      <div class="account-balance-section">
        <div class="balance-label">Saldo disponibile</div>
        <div class="balance-amount">{{getAccountBalance()}}</div>
        <span class="balance-currency">{{getAccountCurrency()}}</span>
      </div>
    </div>
  </div>

  <div class="transactions-wrapper">
    <h3 class="section-title">
      <mat-icon>receipt_long</mat-icon>
      Storico Transazioni
    </h3>
    @if (getAccountId() > 0) {
      <app-transactions-list />
    }
  </div>
</div>
